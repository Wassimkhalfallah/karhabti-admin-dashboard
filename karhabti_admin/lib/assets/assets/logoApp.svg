<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg"> <defs> <linearGradient id="circleGradient" x1="0" y1="0" x2="1" y2="0"> <stop offset="0%" stop-color="#007BFF"/> <stop offset="100%" stop-color="#6c757d"/> </linearGradient> </defs> <!-- Cercle dégradé symbolisant la modernité --> <circle cx="60" cy="60" r="50" fill="url(#circleGradient)"/> <!-- Silhouette abstraite d'une voiture en blanc --> <path d="M30,70 Q50,40 80,70" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/> <circle cx="45" cy="75" r="5" fill="white"/> <circle cx="75" cy="75" r="5" fill="white"/> <!-- Texte de l'application --> <text x="130" y="70" font-family="Arial, sans-serif" font-size="32" fill="#333">AutoCare Assistant</text> </svg>